{% extends "_base.html" %}
{% block content %}
<h1 style="font-size:20px;font-weight:600;margin:0 0 12px;color:#f0eaf8;">Nueva solicitud de curador</h1>
<p style="font-size:14px;line-height:1.6;color:#9b8ab4;margin:0 0 16px;">
  Un profesional envió una solicitud para revisión.
</p>
<div style="background:#0f0c1f;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:16px 20px;">
  <p style="font-size:13px;color:#f0eaf8;margin:0 0 8px;"><strong>Nombre:</strong> {{ nombre }}</p>
  <p style="font-size:13px;color:#f0eaf8;margin:0 0 8px;"><strong>Correo:</strong> {{ correo }}</p>
  <p style="font-size:13px;color:#f0eaf8;margin:0 0 8px;"><strong>Tipo:</strong> {{ tipo_profesional }}</p>
</div>
{% endblock %}
