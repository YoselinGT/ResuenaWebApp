{% extends "_base.html" %}
{% block content %}
<h1 style="font-size:20px;font-weight:600;margin:0 0 12px;color:#f0eaf8;">Restablece tu contraseña</h1>
<p style="font-size:14px;line-height:1.6;color:#9b8ab4;margin:0 0 24px;">
  Hola {{ nombre }}, recibimos una solicitud para restablecer tu contraseña.
  Este enlace vence en 1 hora.
</p>
<div style="text-align:center;margin:28px 0;">
  <a href="{{ url }}"
     style="display:inline-block;background:#5c269c;color:#ffffff;text-decoration:none;
            font-weight:600;font-size:14px;padding:14px 32px;border-radius:10px;">
    Crear nueva contraseña
  </a>
</div>
<p style="font-size:12px;color:#9b8ab4;margin:24px 0 0;word-break:break-all;">
  Si no solicitaste esto, ignora este correo. Tu contraseña no cambiará.<br />{{ url }}
</p>
{% endblock %}
