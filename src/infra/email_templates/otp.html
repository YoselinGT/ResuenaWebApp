{% extends "_base.html" %}
{% block content %}
<h1 style="font-size:20px;font-weight:600;margin:0 0 12px;color:#f0eaf8;">Tu código de acceso</h1>
<p style="font-size:14px;line-height:1.6;color:#9b8ab4;margin:0 0 24px;">
  Usa este código para completar tu inicio de sesión. Vence en 10 minutos.
</p>
<div style="text-align:center;margin:24px 0;">
  <span style="display:inline-block;font-size:32px;font-weight:700;letter-spacing:8px;
               color:#f0eaf8;background:#0f0c1f;border:1px solid #5c269c;border-radius:12px;
               padding:16px 24px;font-family:'Courier New',monospace;">{{ codigo }}</span>
</div>
<p style="font-size:12px;color:#9b8ab4;margin:24px 0 0;">
  Si no intentaste iniciar sesión, cambia tu contraseña de inmediato.
</p>
{% endblock %}
