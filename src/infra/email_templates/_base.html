<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resuena</title>
</head>
<body style="margin:0;padding:0;background:#0f0c1f;font-family:'Inter',Arial,sans-serif;color:#f0eaf8;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0f0c1f;padding:32px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0"
               style="background:#13102a;border:1px solid rgba(255,255,255,0.08);border-radius:16px;overflow:hidden;">
          <tr>
            <td style="padding:32px 40px 16px;text-align:center;">
              <span style="font-size:24px;font-weight:700;letter-spacing:1px;color:#7b3fcf;">RESUENA</span>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 40px 40px;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="padding:20px 40px;border-top:1px solid rgba(255,255,255,0.08);text-align:center;">
              <span style="font-size:12px;color:#9b8ab4;">
                Resuena · Plataforma de campañas musicales<br />
                Si no solicitaste esto, ignora este correo.
              </span>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
